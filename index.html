<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Central de Comunicados</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="container py-5">

    <header class="text-center mb-5">

        <h1 class="display-4">
            <i class="bi bi-megaphone-fill"></i>
            Central de Comunicados
        </h1>

        <p class="lead">
            NucleoDesenvolvimento
        </p>

    </header>

    <div class="row g-4">

        <div class="col-lg-4">

            <div class="card aviso-card">

                <div class="card-body">

                    <span class="badge bg-info">IMPORTANTE</span>

                    <h3 class="mt-3">
                        Atualização do Sistema
                    </h3>

                    <p>
                        Esta é uma mensagem de exemplo.
                    </p>

                    <button class="btn btn-info">
                        Saiba mais
                    </button>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card aviso-card">

                <div class="card-body">

                    <span class="badge bg-warning text-dark">
                        ALERTA
                    </span>

                    <h3 class="mt-3">
                        Aviso
                    </h3>

                    <p>
                        Segunda mensagem de exemplo.
                    </p>

                    <button class="btn btn-warning">
                        Abrir
                    </button>

                </div>

            </div>

        </div>

        <div class="col-lg-4">

            <div class="card aviso-card">

                <div class="card-body">

                    <span class="badge bg-success">
                        EVENTO
                    </span>

                    <h3 class="mt-3">
                        Capacitação
                    </h3>

                    <p>
                        Terceira mensagem de exemplo.
                    </p>

                    <button class="btn btn-success">
                        Ver evento
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
